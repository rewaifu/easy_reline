name: Release

permissions:
  contents: write

on:
  push:
    tags:
      - "v*"

jobs:
  # ── Windows x86_64 → .msi + NSIS .exe ─────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Build Tauri (Windows x86_64)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Release ${{ github.ref_name }}"
          releaseBody: "See commits for changes."
          releaseDraft: false
          prerelease: false
          args: --target x86_64-pc-windows-msvc

  # ── Arch-like x86_64 → no-bundle + tar.gz ─────────────────────────────────
  build-linux-arch:
    runs-on: ubuntu-22.04
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Build Tauri (no-bundle)
        run: bunx tauri build --target x86_64-unknown-linux-gnu --no-bundle

      - name: Pack tar.gz for Arch
        run: |
          # Rust называет бинарник easy_reline (подчёркивание), не easy-reline
          BINARY_PATH="src-tauri/target/x86_64-unknown-linux-gnu/release/easy_reline"

          if [ ! -f "$BINARY_PATH" ]; then
            echo "Binary not found, skipping"
            exit 1
          fi

          mkdir -p dist-arch/easy_reline
          cp "$BINARY_PATH" dist-arch/easy_reline/

          if [ -d "src-tauri/uv_bin" ]; then
            cp -r src-tauri/uv_bin dist-arch/easy_reline/
          fi

          chmod +x dist-arch/easy_reline/easy_reline

          # Имя файла детерминировано — используем тег напрямую
          tar -czf "easy_reline-${{ github.ref_name }}-x86_64-linux.tar.gz" \
            -C dist-arch easy_reline

      - name: Upload tar.gz to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: easy_reline-${{ github.ref_name }}-x86_64-linux.tar.gz
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
